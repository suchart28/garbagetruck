<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงานแจ้งเหตุ (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="admin-container">
        <div id="login-section" class="card" style="max-width: 400px; margin: 100px auto;">
            <h2 style="text-align: center;">ผู้ดูแลระบบ (Admin)</h2>
            <input type="password" id="password" placeholder="ใส่รหัสผ่านแอดมิน">
            <button onclick="loginAdmin()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>
        <div id="admin-dashboard" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <h2>รายการแจ้งเหตุ</h2>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="printSummaryTable()" class="btn-success">🖨️ พิมพ์ตาราง (A4)</button>
                        <button onclick="logoutAdmin()" class="btn-danger" style="width:auto; padding:5px 15px;">Logout</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>ประเภท</th><th>เบอร์ติดต่อ</th><th>เวลาที่แจ้ง</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
                    <tbody id="reportTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="print-section" class="hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allReports = null;

        window.onload = () => {
            if (localStorage.getItem('isAdminLoggedIn') === 'true') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadAllReports();
            }
        };

        window.loginAdmin = () => {
            if(document.getElementById('password').value === "987654321") {
                localStorage.setItem('isAdminLoggedIn', 'true');
                location.reload();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        };

        window.logoutAdmin = () => {
            localStorage.removeItem('isAdminLoggedIn');
            location.reload();
        };

        function loadAllReports() {
            onValue(ref(db, 'reports'), (snapshot) => {
                const data = snapshot.val();
                allReports = data;
                const table = document.getElementById('reportTable');
                table.innerHTML = "";
                if (!data) return;
                Object.keys(data).forEach(id => {
                    const r = data[id];
                    const time = new Date(r.timestamp).toLocaleString('th-TH');
                    const row = `<tr>
                        <td><b>${r.type}</b></td>
                        <td>${r.phone || '-'}</td>
                        <td style="font-size:12px;">${time}</td>
                        <td><span class="status-badge status-${r.status}">${r.status}</span></td>
                        <td>
                            <select onchange="updateStatus('${id}', this.value)" style="width:100px;">
                                <option value="pending" ${r.status==='pending'?'selected':''}>รอ</option>
                                <option value="process" ${r.status==='process'?'selected':''}>ทำ</option>
                                <option value="done" ${r.status==='done'?'selected':''}>เสร็จ</option>
                            </select>
                            <button onclick="printTicket('${r.type}', '${r.phone}', '${time}', ${r.lat}, ${r.lng})" class="btn-print" style="width:auto; padding:2px 5px;">🖨️</button>
                        </td>
                    </tr>`;
                    table.innerHTML += row;
                });
            });
        }

        window.updateStatus = (id, newStatus) => { update(ref(db, `reports/${id}`), { status: newStatus }); };
        
        window.printTicket = (type, phone, time, lat, lng) => {
            const printSec = document.getElementById('print-section');
            const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
            printSec.innerHTML = `<div class="ticket"><h2>ใบสั่งงาน</h2><b>${type}</b><br>โทร: ${phone}<br>เวลา: ${time}<br><div id="qrcode"></div><span>สแกนนำทาง</span></div>`;
            new QRCode(document.getElementById("qrcode"), { text: mapUrl, width: 120, height: 120 });
            printSec.classList.remove('hidden');
            setTimeout(() => { window.print(); printSec.classList.add('hidden'); }, 500);
        };

        window.printSummaryTable = () => {
            if (!allReports) return;
            let rows = '';
            Object.keys(allReports).slice(0, 5).forEach((id, idx) => {
                const r = allReports[id];
                const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`;
                rows += `<tr><td>${idx+1}</td><td>${r.type}<br>${r.phone}</td><td style="text-align:center;"><div id="qr-${idx}" class="row-qr"></div></td><td></td></tr>`;
            });
            const printSec = document.getElementById('print-section');
            printSec.innerHTML = `<div class="print-table-container"><h2>ตารางงาน (A4)</h2><table class="print-list-table"><thead><tr><th>#</th><th>งาน / เบอร์</th><th>สแกนนำทาง</th><th>ชื่อผู้เก็บ</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            Object.keys(allReports).slice(0, 5).forEach((id, idx) => {
                const r = allReports[id];
                new QRCode(document.getElementById(`qr-${idx}`), { text: `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`, width: 60, height: 60 });
            });
            printSec.classList.remove('hidden');
            setTimeout(() => { window.print(); printSec.classList.add('hidden'); }, 600);
        };
    </script>
</body>
</html>
