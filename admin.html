<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการหลังบ้าน (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* บังคับซ่อนส่วน Dashboard ไว้ก่อนเสมอ */
        #admin-login-section, #admin-dashboard { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div id="admin-login-section" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน Admin">
            <button onclick="loginAdmin()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>

        <div id="admin-dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>แผงควบคุมระบบขยะ</h1>
                <button onclick="logoutAdmin()" class="btn-danger" style="width: auto; padding: 8px 20px;">ออกจากระบบ</button>
            </div>
            
            <div class="card">
                <div class="stats-container">
                    <div class="stat-box"><h4>ทั้งหมด</h4><div id="total-count" class="count">0</div></div>
                    <div class="stat-box"><h4>รอดำเนินการ</h4><div id="pending-count" class="count" style="color: #ff9800;">0</div></div>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr><th>รหัสงาน</th><th>ประเภท</th><th>เบอร์ติดต่อ</th><th>สถานะ</th><th>จัดการ</th></tr>
                    </thead>
                    <tbody id="report-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function checkAuth() {
            const isAdmin = localStorage.getItem('isAdminLoggedIn');
            document.getElementById('admin-login-section').classList.remove('visible');
            document.getElementById('admin-dashboard').classList.remove('visible');

            if (isAdmin === 'true') {
                document.getElementById('admin-dashboard').classList.add('visible');
                loadReports();
            } else {
                document.getElementById('admin-login-section').classList.add('visible');
            }
        }
        checkAuth();

        window.loginAdmin = () => {
            if (document.getElementById('adminPass').value === "admin1234") {
                localStorage.setItem('isAdminLoggedIn', 'true');
                checkAuth();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        };

        window.logoutAdmin = () => {
            localStorage.removeItem('isAdminLoggedIn');
            location.reload();
        };

        function loadReports() {
            onValue(ref(db, 'reports'), (snapshot) => {
                const list = document.getElementById('report-list');
                list.innerHTML = "";
                if (snapshot.exists()) {
                    const data = [];
                    snapshot.forEach(c => data.push({key: c.key, ...c.val()}));
                    data.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                        const row = `<tr>
                            <td>${item.reportId}</td>
                            <td>${item.type}</td>
                            <td>${item.phone}</td>
                            <td>${item.status}</td>
                            <td><button onclick="deleteReport('${item.key}')" class="btn-danger">ลบ</button></td>
                        </tr>`;
                        list.innerHTML += row;
                    });
                }
            });
        }
        window.deleteReport = (key) => remove(ref(db, `reports/${key}`));
    </script>
</body>
</html>
