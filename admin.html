<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการงานขยะ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <div id="login-section" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน">
            <button onclick="loginAdmin()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>

        <div id="admin-dashboard" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>แผงจัดการงานแจ้งเหตุ</h1>
                <button onclick="logout()" class="btn-danger" style="width: auto;">Logout</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr><th>ประเภท</th><th>เบอร์โทร</th><th>เวลา</th><th>สถานะ</th><th>จัดการ</th></tr>
                    </thead>
                    <tbody id="reportTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function checkAuth() {
            if(localStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadData();
            }
        }
        checkAuth();

        window.loginAdmin = () => {
            if(document.getElementById('adminPass').value === '987654321') {
                localStorage.setItem('isAdmin', 'true');
                location.reload();
            } else alert("รหัสผ่านผิด");
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        function loadData() {
            onValue(ref(db, 'reports'), (snap) => {
                const table = document.getElementById('reportTable');
                table.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(key => {
                        const r = data[key];
                        if(r.status === 'pending') {
                            table.innerHTML += `<tr>
                                <td>${r.type}</td>
                                <td>${r.phone}</td>
                                <td>${new Date(r.timestamp).toLocaleString()}</td>
                                <td>รอดำเนินการ</td>
                                <td><button onclick="done('${key}')" class="btn-success">สำเร็จ (ลบหมุด)</button></td>
                            </tr>`;
                        }
                    });
                }
            });
        }

        window.done = (key) => {
            update(ref(db, `reports/${key}`), { status: 'done' });
        };
    </script>
</body>
</html>
