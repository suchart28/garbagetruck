<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงานแจ้งเหตุ (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        #admin-login-section, #admin-dashboard { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div id="admin-login-section" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2 style="margin-top:0;">ผู้ดูแลระบบ (Admin)</h2>
            <p>กรุณาใส่รหัสผ่านเพื่อเข้าถึงข้อมูล</p>
            <input type="password" id="adminPass" placeholder="ใส่รหัสผ่านแอดมิน">
            <button onclick="loginAdmin()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>

        <div id="admin-dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin:0;">แผงควบคุมระบบขยะ</h1>
                <button onclick="logoutAdmin()" class="btn-danger" style="width: auto; padding: 8px 20px;">ออกจากระบบ</button>
            </div>

            <div class="card">
                <h3 style="margin: 0; color: #004085;">📊 สถิติผลการปฏิบัติงาน (รายเดือน)</h3>
                <div id="statsBox" class="stats-container"></div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
                    <h2 style="margin: 0; color: #dc3545;">🚨 งานที่ค้างดำเนินการ (ล่าสุดอยู่บน)</h2>
                    <button onclick="printSummaryTable()" class="btn-success" style="width:auto; padding:8px 15px;">🖨️ พิมพ์ตาราง (A4)</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>รหัสงาน</th>
                                <th>ประเภท</th>
                                <th>เบอร์ติดต่อ</th>
                                <th>เวลาที่แจ้ง</th>
                                <th>สถานะ</th>
                                <th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="reportTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="print-section" class="hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allReports = [];

        function checkAuth() {
            const isAdmin = localStorage.getItem('isAdminLoggedIn');
            document.getElementById('admin-login-section').classList.remove('visible');
            document.getElementById('admin-dashboard').classList.remove('visible');

            if (isAdmin === 'true') {
                document.getElementById('admin-dashboard').classList.add('visible');
                loadAllReports(); 
            } else {
                document.getElementById('admin-login-section').classList.add('visible');
            }
        }
        checkAuth();

        window.loginAdmin = () => {
            if (document.getElementById('adminPass').value === "987654321") {
                localStorage.setItem('isAdminLoggedIn', 'true');
                checkAuth();
            } else alert("รหัสผ่านไม่ถูกต้อง");
        };

        window.logoutAdmin = () => {
            localStorage.removeItem('isAdminLoggedIn');
            location.reload();
        };

        function loadAllReports() {
            onValue(ref(db, 'reports'), (snapshot) => {
                const data = snapshot.val();
                const table = document.getElementById('reportTable');
                const statsBox = document.getElementById('statsBox');
                table.innerHTML = ""; statsBox.innerHTML = "";
                allReports = [];

                if (!data) return;

                let monthlyStats = {};

                Object.keys(data).forEach(key => {
                    const r = data[key];
                    r.firebaseKey = key;
                    allReports.push(r);

                    const d = new Date(r.timestamp);
                    const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    const monthLabel = d.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
                    
                    if (!monthlyStats[monthKey]) monthlyStats[monthKey] = { total: 0, done: 0, label: monthLabel };
                    monthlyStats[monthKey].total += 1;
                    if (r.status === 'done') monthlyStats[monthKey].done += 1;
                });

                Object.values(monthlyStats).forEach(stat => {
                    statsBox.innerHTML += `
                        <div class="stat-box">
                            <h4>${stat.label}</h4>
                            <div class="count">${stat.done}/${stat.total}</div>
                            <span style="font-size:12px;">(เสร็จสิ้น/ทั้งหมด)</span>
                        </div>`;
                });

                allReports
                    .filter(r => r.status !== 'done')
                    .sort((a, b) => b.timestamp - a.timestamp)
                    .forEach(r => {
                        table.innerHTML += `
                            <tr>
                                <td style="color:#007bff; font-weight:bold;">${r.reportId || '-'}</td>
                                <td>${r.type}</td>
                                <td><a href="tel:${r.phone}">${r.phone}</a></td>
                                <td>${new Date(r.timestamp).toLocaleString('th-TH')}</td>
                                <td><span class="status-badge status-pending">รอดำเนินการ</span></td>
                                <td>
                                    <button onclick="updateStatus('${r.firebaseKey}', 'done')" class="btn-success" style="width:auto; padding:5px 10px;">✅ สำเร็จ (ลบหมุด)</button>
                                </td>
                            </tr>`;
                    });
            });
        }

        // เมื่อกดปุ่ม สถานะจะเปลี่ยนเป็น done ทำให้หมุดใน index.html หายไป
        window.updateStatus = (key, status) => {
            update(ref(db, `reports/${key}`), { status: status });
        };

        window.printSummaryTable = () => {
            const tasksToPrint = allReports.filter(r => r.status !== 'done').slice(0, 5); // ปรินท์ 5 งานแรก
            if (tasksToPrint.length === 0) { alert("ไม่มีงานที่ต้องดำเนินการ"); return; }
            
            let rows = "";
            tasksToPrint.forEach((r, idx) => {
                rows += `
                    <tr>
                        <td style="text-align:center;">${idx + 1}</td>
                        <td><b>${r.reportId}</b><br>${r.type}<br>${new Date(r.timestamp).toLocaleString('th-TH')}</td>
                        <td>${r.phone}</td>
                        <td style="text-align:center;"><div id="qr-${idx}" class="row-qr"></div></td>
                        <td></td>
                    </tr>`;
            });

            const printSec = document.getElementById('print-section');
            printSec.innerHTML = `
                <div class="print-table-container">
                    <h2 style="text-align:center;">ตารางปฏิบัติงานเก็บขยะ</h2>
                    <table class="print-list-table">
                        <thead><tr><th>#</th><th>รหัสงาน/ประเภท/เวลา</th><th>เบอร์ติดต่อ</th><th>นำทาง</th><th style="width:120px;">ลายมือชื่อ</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div style="margin-top: 40px; display: flex; justify-content: space-between;">
                        <div>ลงชื่อ .................................................. พนักงานขับรถ</div>
                        <div>ลงชื่อ .................................................. หัวหน้าชุดปฏิบัติการ</div>
                    </div>
                </div>`;

            tasksToPrint.forEach((r, idx) => {
                new QRCode(document.getElementById(`qr-${idx}`), { text: `https://www.google.com/maps?q=${r.lat},${r.lng}`, width: 60, height: 60 });
            });

            printSec.classList.remove('hidden');
            setTimeout(() => { window.print(); printSec.classList.add('hidden'); }, 800);
        };
    </script>
</body>
</html>
