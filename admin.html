<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงานแจ้งเหตุ (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="admin-container">
        <div id="login-section" class="card" style="max-width: 400px; margin: 100px auto;">
            <h2 style="text-align: center;">ผู้ดูแลระบบ (Admin)</h2>
            <input type="password" id="password" placeholder="ใส่รหัสผ่านแอดมิน">
            <button onclick="loginAdmin()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>

        <div id="admin-dashboard" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <h2>รายการแจ้งเหตุจากประชาชน</h2>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="printSummaryTable()" class="btn-success" style="width: auto; padding: 8px 15px;">🖨️ พิมพ์ตารางงาน (A4)</button>
                        <button onclick="location.reload()" style="width: auto; padding: 8px 15px;">รีเฟรชข้อมูล</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ประเภท</th>
                            <th>เบอร์ติดต่อ</th>
                            <th>เวลาที่แจ้ง</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="reportTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="print-section" class="hidden"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let allReportsData = null; // เก็บข้อมูลไว้สำหรับตาราง A4

        window.loginAdmin = () => {
            if(document.getElementById('password').value === "987654321") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadAllReports();
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        };

        function loadAllReports() {
            onValue(ref(db, 'reports'), (snapshot) => {
                const data = snapshot.val();
                allReportsData = data; // บันทึกเข้าตัวแปรส่วนกลาง
                const table = document.getElementById('reportTable');
                table.innerHTML = "";
                
                if (!data) { table.innerHTML = "<tr><td colspan='5' style='text-align:center'>ไม่มีข้อมูลการแจ้งเหตุ</td></tr>"; return; }

                Object.keys(data).forEach(id => {
                    const r = data[id];
                    const time = new Date(r.timestamp).toLocaleString('th-TH');
                    const phoneDisplay = r.phone ? r.phone : '<span style="color:#aaa;">ไม่ระบุ</span>';
                    
                    let statusClass = r.status === 'pending' ? 'status-pending' : (r.status === 'process' ? 'status-process' : 'status-done');
                    let statusText = r.status === 'pending' ? 'รอดำเนินการ' : (r.status === 'process' ? 'กำลังดำเนินการ' : 'เสร็จสิ้น');

                    const row = `
                        <tr>
                            <td><b>${r.type}</b></td>
                            <td>${phoneDisplay}</td>
                            <td style="font-size: 13px;">${time}</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>
                                <select onchange="updateStatus('${id}', this.value)" style="width: 120px; font-size: 12px; margin: 0;">
                                    <option value="pending" ${r.status==='pending'?'selected':''}>รอดำเนินการ</option>
                                    <option value="process" ${r.status==='process'?'selected':''}>กำลังดำเนินการ</option>
                                    <option value="done" ${r.status==='done'?'selected':''}>เสร็จสิ้น</option>
                                </select>
                                <button onclick="viewMap(${r.lat}, ${r.lng})" class="btn-primary" style="width: auto; padding: 4px 8px; font-size: 11px;">📍 แผนที่</button>
                                <button onclick="printTicket('${r.type}', '${r.phone || 'ไม่ระบุ'}', '${time}', ${r.lat}, ${r.lng})" class="btn-print" style="width: auto; padding: 4px 8px; font-size: 11px;">🖨️ ตั๋วงาน</button>
                                <button onclick="deleteReport('${id}')" class="btn-danger" style="width: auto; padding: 4px 8px; font-size: 11px;">ลบ</button>
                            </td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
            });
        }

        window.updateStatus = (id, newStatus) => { update(ref(db, `reports/${id}`), { status: newStatus }); };
        window.viewMap = (lat, lng) => { window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank'); };
        window.deleteReport = (id) => { if(confirm("ต้องการลบข้อมูลนี้ออกจากระบบหรือไม่?")) remove(ref(db, `reports/${id}`)); };

        // 1. ฟังก์ชันพิมพ์ใบงานเดี่ยวพร้อม QR Code
        window.printTicket = (type, phone, time, lat, lng) => {
            const printSec = document.getElementById('print-section');
            const mapUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
            
            printSec.innerHTML = `
                <div class="ticket">
                    <h2>ใบสั่งงานเทศบาล</h2>
                    <div class="ticket-info">
                        <b>ประเภทปัญหา:</b> ${type}<br>
                        <b>เบอร์ติดต่อ:</b> ${phone}<br>
                        <b>เวลาแจ้ง:</b> ${time}<br>
                        <b>พิกัด:</b> ${lat.toFixed(5)}, ${lng.toFixed(5)}
                    </div>
                    <div id="qrcode"></div>
                    <p style="font-size: 14px; font-weight: bold;">(สแกน QR Code ด้วยมือถือเพื่อเปิดแผนที่นำทาง)</p>
                    <p style="margin-top:40px; border-top:1px solid #ccc; padding-top:10px;">ลายมือชื่อผู้ปฏิบัติงาน: ...........................................</p>
                </div>
            `;
            
            new QRCode(document.getElementById("qrcode"), {
                text: mapUrl, width: 150, height: 150, colorDark : "#000000", colorLight : "#ffffff"
            });

            triggerPrint(printSec);
        };

        // 2. ฟังก์ชันพิมพ์ตารางงาน A4 สูงสุด 5 รายการ
        window.printSummaryTable = () => {
            if (!allReportsData) { alert("ไม่มีข้อมูลในระบบ"); return; }
            
            // กรองเอาเฉพาะงานที่ยังไม่เสร็จ (รอดำเนินการ / กำลังดำเนินการ)
            let pendingTasks = [];
            Object.keys(allReportsData).forEach(id => {
                if(allReportsData[id].status !== 'done') {
                    pendingTasks.push(allReportsData[id]);
                }
            });

            if (pendingTasks.length === 0) { alert("ไม่มีงานที่ค้างอยู่"); return; }

            // เลือกมาแค่ 5 รายการแรก
            const tasksToPrint = pendingTasks.slice(0, 5);
            
            let tableRows = '';
            tasksToPrint.forEach((r, index) => {
                const time = new Date(r.timestamp).toLocaleString('th-TH');
                tableRows += `
                    <tr>
                        <td style="text-align:center;">${index + 1}</td>
                        <td>
                            <b>${r.type}</b><br>
                            <span style="font-size:14px; color:#555;">เวลา: ${time}</span>
                        </td>
                        <td>${r.phone || '-'}</td>
                        <td style="font-size:14px;">Lat: ${r.lat.toFixed(5)}<br>Lng: ${r.lng.toFixed(5)}</td>
                        <td style="width: 120px;"></td> </tr>
                `;
            });

            const printSec = document.getElementById('print-section');
            const currentDate = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

            printSec.innerHTML = `
                <div class="print-table-container">
                    <h2>ตารางปฏิบัติงานเก็บขยะชิ้นใหญ่ / ล้นถัง</h2>
                    <p><b>ประจำวันที่:</b> ${currentDate}</p>
                    <table class="print-list-table">
                        <thead>
                            <tr>
                                <th style="width:50px;">ลำดับ</th>
                                <th>ประเภทปัญหา / เวลาแจ้ง</th>
                                <th>เบอร์ติดต่อ</th>
                                <th>พิกัด (GPS)</th>
                                <th>ผลการปฏิบัติงาน<br>(ลายมือชื่อ)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                    <div style="margin-top: 30px; display: flex; justify-content: space-between;">
                        <div>ลงชื่อ .............................................................. พนักงานขับรถ</div>
                        <div>ลงชื่อ .............................................................. หัวหน้าชุดปฏิบัติการ</div>
                    </div>
                </div>
            `;

            triggerPrint(printSec);
        };

        // ฟังก์ชันสั่งพิมพ์
        function triggerPrint(printSec) {
            printSec.classList.remove('hidden');
            setTimeout(() => {
                window.print();
                printSec.classList.add('hidden');
            }, 300);
        }
    </script>
</body>
</html>
