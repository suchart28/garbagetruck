<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคนขับรถเก็บขยะ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="driver-panel">
        <h2>ระบบคนขับ</h2>
        
        <div id="login-section">
            <input type="password" id="password" placeholder="ใส่รหัสผ่านเพื่อเข้าใช้งาน">
            <button id="loginBtn">ยืนยันรหัสผ่าน</button>
        </div>

        <div id="setup-section" class="hidden">
            <p>ระบุข้อมูลก่อนเริ่มงาน</p>
            <input type="text" id="truckNo" placeholder="หมายเลขรถ (เช่น ก-123)">
            <input type="text" id="routeName" placeholder="ชื่อสาย/เส้นทาง (เช่น สายตลาดสด)">
            <button id="startBtn">เริ่มส่งตำแหน่งพิกัด</button>
        </div>

        <div id="active-section" class="hidden">
            <div class="status-box" style="background:#e9ecef; padding:15px; border-radius:8px;">
                <div id="status" class="success">สถานะ: กำลังส่งพิกัด...</div>
                <div id="displayInfo" style="margin-top:5px; font-weight:bold;"></div>
                <div id="coords" style="margin-top:10px; font-size:12px; color:#888;"></div>
            </div>
            <button id="stopBtn" class="stop">หยุดการทำงาน</button>
            <p style="font-size: 11px; color: #d32f2f; margin-top:15px;">* ห้ามปิดหน้าจอนี้ขณะทำงาน</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const truckRef = ref(db, 'truckLocation');

        let isTracking = false;
        let watchId = null;
        let wakeLock = null;
        let lastSendTime = 0;

        // 1. ตรวจสอบรหัสผ่าน
        document.getElementById('loginBtn').onclick = () => {
            if(document.getElementById('password').value === "987654321") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('setup-section').classList.remove('hidden');
            } else {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        };

        // 2. เริ่มส่งตำแหน่ง
        document.getElementById('startBtn').onclick = () => {
            const truckNo = document.getElementById('truckNo').value;
            const routeName = document.getElementById('routeName').value;

            if(!truckNo || !routeName) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            if (navigator.geolocation) {
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('active-section').classList.remove('hidden');
                document.getElementById('displayInfo').innerText = `รถ: ${truckNo} | ${routeName}`;
                
                onDisconnect(truckRef).remove();
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const now = Date.now();
                    document.getElementById('coords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    
                    if (now - lastSendTime >= 5000) {
                        set(truckRef, { lat, lng, truckNo, routeName, timestamp: now });
                        lastSendTime = now;
                    }
                }, null, { enableHighAccuracy: true });

                isTracking = true;
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(lock => wakeLock = lock);
            }
        };

        // 3. หยุดการทำงาน
        document.getElementById('stopBtn').onclick = () => {
            navigator.geolocation.clearWatch(watchId);
            remove(truckRef);
            location.reload(); // รีเฟรชหน้าจอเพื่อล้างค่าทั้งหมด
        };
    </script>
</body>
</html>
