<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคนขับรถเก็บขยะ (GPS)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="driver-panel">
        <h2>ระบบคนขับ (GPS)</h2>
        
        <div id="login-section">
            <input type="password" id="password" placeholder="ใส่รหัสผ่านคนขับ">
            <button onclick="loginDriver()" class="btn-primary">ยืนยันรหัสผ่าน</button>
        </div>

        <div id="active-section" class="hidden">
            <div id="setup-section">
                <input type="text" id="truckNo" placeholder="หมายเลขรถ (เช่น ก-123)">
                <input type="text" id="routeName" placeholder="สาย/เส้นทาง">
                <button onclick="startSharing()" class="btn-success">เริ่มแชร์ตำแหน่ง</button>
                <button onclick="logoutDriver()" class="btn-danger" style="margin-top: 15px; background-color: #6c757d;">ออกจากระบบ</button>
            </div>
            
            <div id="sharing-status" class="hidden">
                <div style="background: #e9ecef; padding: 20px; border-radius: 8px;">
                    <h3 style="color: #28a745; margin: 0;">● กำลังส่งพิกัดพิกัด...</h3>
                    <p id="truckDisplay" style="font-weight: bold;"></p>
                </div>
                <button onclick="location.reload()" class="btn-danger" style="margin-top: 20px;">หยุดการแชร์ตำแหน่ง</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const truckRef = ref(db, 'truckLocation');

        // --- เพิ่มระบบจดจำรหัสผ่าน ---
        window.onload = () => {
            if (localStorage.getItem('isDriverLoggedIn') === 'true') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('active-section').classList.remove('hidden');
            }
        };

        window.loginDriver = () => {
            if(document.getElementById('password').value === "987654321") {
                localStorage.setItem('isDriverLoggedIn', 'true'); // บันทึกสถานะ
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('active-section').classList.remove('hidden');
            } else { alert("รหัสผ่านไม่ถูกต้อง"); }
        };

        window.logoutDriver = () => {
            localStorage.removeItem('isDriverLoggedIn'); // ลบการจำรหัสผ่าน
            location.reload();
        };
        // ------------------------------

        window.startSharing = () => {
            const tNo = document.getElementById('truckNo').value;
            const rName = document.getElementById('routeName').value;
            if(!tNo || !rName) { alert("ระบุข้อมูลให้ครบ"); return; }

            if (navigator.geolocation) {
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('sharing-status').classList.remove('hidden');
                document.getElementById('truckDisplay').innerText = `รถหมายเลข: ${tNo} (${rName})`;

                onDisconnect(truckRef).remove();
                navigator.geolocation.watchPosition((pos) => {
                    set(truckRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, truckNo: tNo, routeName: rName, timestamp: Date.now() });
                }, null, { enableHighAccuracy: true });
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
            }
        };
    </script>
</body>
</html>
