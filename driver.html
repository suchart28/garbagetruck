<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคนขับรถเก็บขยะ (โหมดประหยัดพลังงาน)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="driver-panel">
        <h2>ระบบคนขับ</h2>
        <div class="status-box">
            <div id="status" class="danger">สถานะ: ปิดการทำงาน</div>
            <div id="coords" style="margin-top:10px; font-size:12px; color:#888;">พิกัดล่าสุด: -</div>
        </div>
        <button id="toggleBtn">เริ่มส่งตำแหน่ง</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        // ตั้งค่า Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const truckRef = ref(db, 'truckLocation');

        let watchId = null;
        let isTracking = false;
        
        // ตัวแปรสำหรับหน่วงเวลาส่งข้อมูลเพื่อประหยัดเน็ต
        let lastSendTime = 0;
        const SEND_INTERVAL = 5000; // ส่งพิกัดทุกๆ 5 วินาที

        function toggleTracking() {
            const btn = document.getElementById('toggleBtn');
            const statusText = document.getElementById('status');
            const coordsText = document.getElementById('coords');

            if (!isTracking) {
                if (navigator.geolocation) {
                    // ถ้าเน็ตหลุด ให้ลบพิกัดรถออกจากแผนที่ผู้ใช้อัตโนมัติ
                    onDisconnect(truckRef).remove();

                    watchId = navigator.geolocation.watchPosition(updatePosition, handleError, {
                        enableHighAccuracy: true, 
                        maximumAge: 10000, 
                        timeout: 10000
                    });
                    
                    isTracking = true;
                    btn.innerText = "หยุดส่งตำแหน่ง";
                    btn.classList.add('stop');
                    statusText.innerText = "สถานะ: กำลังส่งตำแหน่ง...";
                    statusText.className = "success";
                } else {
                    alert("เบราว์เซอร์ของคุณไม่รองรับ GPS");
                }
            } else {
                navigator.geolocation.clearWatch(watchId);
                isTracking = false;
                btn.innerText = "เริ่มส่งตำแหน่ง";
                btn.classList.remove('stop');
                statusText.innerText = "สถานะ: ปิดการทำงาน";
                statusText.className = "danger";
                coordsText.innerText = "พิกัดล่าสุด: -";
                
                // ลบพิกัดออกและยกเลิก onDisconnect
                remove(truckRef);
                onDisconnect(truckRef).cancel();
            }
        }

        document.getElementById('toggleBtn').addEventListener('click', toggleTracking);

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const now = Date.now();
            
            // อัปเดตตัวเลขหน้าจอมือถือคนขับ
            document.getElementById('coords').innerText = `พิกัด: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

            // ส่งขึ้นฐานข้อมูลทุกๆ 5 วินาที
            if (now - lastSendTime >= SEND_INTERVAL) {
                set(truckRef, { lat: lat, lng: lng, timestamp: now })
                    .then(() => {
                        console.log("ส่งพิกัดสำเร็จ");
                        lastSendTime = now;
                    })
                    .catch((error) => console.error("เน็ตหลุด ไม่สามารถส่งได้", error));
            }
        }

        function handleError(error) {
            console.error("GPS Error: ", error);
            document.getElementById('status').innerText = "สถานะ: หาสัญญาณ GPS ไม่เจอ";
            document.getElementById('status').className = "danger";
        }
    </script>
</body>
</html>
