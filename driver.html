<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>คนขับรถขยะ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="driver-panel">
        <div id="login-section">
            <h2>Driver Login</h2>
            <input type="password" id="driverPass" placeholder="รหัสผ่าน">
            <button onclick="login()" class="btn-primary">เข้าสู่ระบบ</button>
        </div>

        <div id="setup-section" class="hidden">
            <input type="text" id="truckNo" placeholder="เบอร์รถ">
            <button onclick="start()" class="btn-success">เริ่มส่งตำแหน่ง</button>
        </div>

        <div id="sharing-status" class="hidden">
            <h3 style="color: green;">กำลังแชร์ตำแหน่ง...</h3>
            <button onclick="location.reload()" class="btn-danger">หยุดแชร์</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = () => {
            if(document.getElementById('driverPass').value === '987654321') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('setup-section').classList.remove('hidden');
            }
        };

        window.start = () => {
            const no = document.getElementById('truckNo').value;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('sharing-status').classList.remove('hidden');
            
            navigator.geolocation.watchPosition(p => {
                set(ref(db, 'truckLocation'), {
                    truckNo: no, lat: p.coords.latitude, lng: p.coords.longitude, timestamp: Date.now()
                });
            }, null, {enableHighAccuracy: true});
            onDisconnect(ref(db, 'truckLocation')).remove();
        };
    </script>
</body>
</html>
