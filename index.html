<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3 style="margin-top:0; margin-bottom: 10px;">รถเก็บขยะเทศบาล</h3>
        <div id="distance-info">กำลังค้นหาตำแหน่งของคุณ...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        // ตั้งค่า Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userLatLng = null;
        let truckLatLng = null;
        let userMarker = null;
        let truckMarker = null;

        const truckIcon = L.divIcon({ className: 'truck-icon truck-moving', iconSize: [24, 24] });

        // 1. หาตำแหน่งของผู้ใช้ (ประชาชน)
        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', function(e) {
            userLatLng = e.latlng;
            if(!userMarker) {
                userMarker = L.marker(userLatLng).addTo(map).bindPopup("ตำแหน่งของคุณ").openPopup();
            } else {
                userMarker.setLatLng(userLatLng);
            }
            calculateDistance();
        });

        map.on('locationerror', function(e) {
            document.getElementById('distance-info').innerHTML = "ไม่สามารถหาตำแหน่งของคุณได้ (กรุณาเปิด GPS)";
        });

        // 2. ติดตามตำแหน่งรถขยะแบบเรียลไทม์จาก Firebase
        const truckRef = ref(db, 'truckLocation');
        onValue(truckRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                truckLatLng = L.latLng(data.lat, data.lng);
                
                if (!truckMarker) {
                    truckMarker = L.marker(truckLatLng, {icon: truckIcon}).addTo(map)
                        .bindPopup("รถเก็บขยะกำลังทำงาน");
                } else {
                    truckMarker.setLatLng(truckLatLng);
                }
                calculateDistance();
            } else {
                document.getElementById('distance-info').innerHTML = "<span style='color:red;'>รถเก็บขยะไม่ได้ออกปฏิบัติงานในขณะนี้</span>";
                if (truckMarker) {
                    map.removeLayer(truckMarker);
                    truckMarker = null;
                }
            }
        });

        // 3. คำนวณระยะห่างระหว่างรถกับผู้ใช้
        function calculateDistance() {
            const infoDiv = document.getElementById('distance-info');
            if (userLatLng && truckLatLng) {
                const distanceMeters = userLatLng.distanceTo(truckLatLng);
                let displayDist = "";
                
                if(distanceMeters > 1000) {
                    displayDist = (distanceMeters / 1000).toFixed(2) + " กิโลเมตร";
                } else {
                    displayDist = Math.round(distanceMeters) + " เมตร";
                }
                
                infoDiv.innerHTML = `ระยะห่างจากคุณ: <strong>${displayDist}</strong>`;
            } else if (!userLatLng) {
                infoDiv.innerHTML = "กรุณาเปิด GPS เพื่อดูระยะห่าง";
            }
        }
    </script>
</body>
</html>
