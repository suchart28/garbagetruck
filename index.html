<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3 style="margin-top:0; margin-bottom: 10px;">รถเก็บขยะเทศบาล</h3>
        <div id="distance-info">กำลังค้นหาตำแหน่งของคุณ...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userLatLng = null;
        let truckLatLng = null;
        let userMarker = null;
        let truckMarker = null;

        // กำหนดไอคอน
        const truckIcon = L.divIcon({ className: 'truck-icon truck-moving', iconSize: [24, 24] });
        const userIcon = L.divIcon({ className: 'user-icon pulse-red', iconSize: [16, 16] }); // ไอคอนผู้ใช้ใหม่

        // 1. หาตำแหน่งของผู้ใช้
        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', function(e) {
            userLatLng = e.latlng;
            if(!userMarker) {
                // สร้าง Marker โดยใส่ icon และลบ Popup ออก
                userMarker = L.marker(userLatLng, { icon: userIcon }).addTo(map);
            } else {
                userMarker.setLatLng(userLatLng);
            }
            calculateDistance();
        });

        // 2. ติดตามตำแหน่งรถขยะจาก Firebase
        const truckRef = ref(db, 'truckLocation');
        onValue(truckRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                truckLatLng = L.latLng(data.lat, data.lng);
                if (!truckMarker) {
                    truckMarker = L.marker(truckLatLng, {icon: truckIcon}).addTo(map);
                } else {
                    truckMarker.setLatLng(truckLatLng);
                }
                calculateDistance();
            } else {
                document.getElementById('distance-info').innerHTML = "<span style='color:red;'>รถเก็บขยะไม่ได้ออกปฏิบัติงาน</span>";
                if (truckMarker) { map.removeLayer(truckMarker); truckMarker = null; }
            }
        });

        function calculateDistance() {
            const infoDiv = document.getElementById('distance-info');
            if (userLatLng && truckLatLng) {
                const distanceMeters = userLatLng.distanceTo(truckLatLng);
                let displayDist = distanceMeters > 1000 ? (distanceMeters / 1000).toFixed(2) + " กม." : Math.round(distanceMeters) + " เมตร";
                infoDiv.innerHTML = `ระยะห่างจากคุณ: <strong>${displayDist}</strong>`;
            }
        }
    </script>
</body>
</html>
