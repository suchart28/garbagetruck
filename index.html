<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ (Public)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3>รถเก็บขยะห่างจากคุณ</h3>
        <div id="distance-info">กำลังหาพิกัด...</div>
    </div>
    
    <button id="audioToggleBtn" class="btn-audio" onclick="toggleAudio()" title="เปิด/ปิด เสียงเตือน">🔇</button>

    <div id="map"></div>
    
    <div class="report-btn-container">
        <button class="btn-report" onclick="openModal()">⚠️ แจ้งปัญหาขยะ</button>
    </div>
    
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">แจ้งปัญหาขยะ</h3>
            <input type="tel" id="reporterPhone" placeholder="เบอร์โทรติดต่อกลับ">
            <button onclick="sendReport('ขยะชิ้นใหญ่')" class="btn-primary">ขยะชิ้นใหญ่</button>
            <button onclick="sendReport('ขยะล้นถัง')" class="btn-primary" style="background: #ff9800;">ขยะล้นถัง</button>
            <button onclick="closeModal()" class="btn-danger">ยกเลิก</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        // คอนฟิก Firebase ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userLatLng = null, truckMarker = null, userMarker = null;
        let isAudioEnabled = false;
        let hasAlerted200m = false;

        map.locate({setView: true, maxZoom: 16, watch: true});
        map.on('locationfound', (e) => {
            userLatLng = e.latlng;
            const userIcon = L.divIcon({ className: 'user-icon pulse-red', iconSize: [16, 16], iconAnchor: [8, 8] });
            if(!userMarker) userMarker = L.marker(userLatLng, { icon: userIcon }).addTo(map);
            else userMarker.setLatLng(userLatLng);
        });

        onValue(ref(db, 'truckLocation'), (snapshot) => {
            const d = snapshot.val();
            if (d) {
                const pos = [d.lat, d.lng];
                const html = `<div class="truck-icon-container">
                                <div class="truck-label">${d.truckNo}</div>
                                <div class="truck-icon truck-moving"></div>
                              </div>`;
                if (!truckMarker) truckMarker = L.marker(pos, { icon: L.divIcon({ className: '', html, iconSize: [100, 50], iconAnchor: [50, 38] }) }).addTo(map);
                else { truckMarker.setLatLng(pos); truckMarker.setIcon(L.divIcon({ className: '', html, iconSize: [100, 50], iconAnchor: [50, 38] })); }
                
                if(userLatLng) {
                    const dist = map.distance(userLatLng, pos);
                    document.getElementById('distance-info').innerText = dist > 1000 ? (dist/1000).toFixed(2)+' กม.' : Math.round(dist)+' เมตร';
                    if (dist <= 200 && isAudioEnabled && !hasAlerted200m) {
                        speakText("รถเก็บขยะเทศบาลนครขอนแก่นกำลังมาถึง โปรดเตรียมถุงขยะที่จะทิ้งให้พร้อมค่ะ");
                        hasAlerted200m = true; 
                    } else if (dist > 300) { hasAlerted200m = false; }
                }
            }
        });

        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH'; utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        window.toggleAudio = () => {
            const btn = document.getElementById('audioToggleBtn');
            isAudioEnabled = !isAudioEnabled;
            if (isAudioEnabled) {
                btn.innerHTML = "🔊"; btn.classList.add('active');
                speakText("เปิดระบบเสียงเตือนแล้ว");
            } else {
                btn.innerHTML = "🔇"; btn.classList.remove('active');
                hasAlerted200m = false;
            }
        };

        window.sendReport = async (type) => {
            const phone = document.getElementById('reporterPhone').value;
            if(!phone || !userLatLng) { alert("ข้อมูลไม่ครบ"); return; }
            const now = new Date();
            const rId = `D${String(now.getDate()).padStart(2,'0')}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getFullYear()+543).slice(-2)}-${Date.now().toString().slice(-3)}`;
            set(push(ref(db, 'reports')), { reportId: rId, type, phone, lat: userLatLng.lat, lng: userLatLng.lng, timestamp: now.getTime(), status: 'pending' })
            .then(() => { alert("แจ้งเหตุสำเร็จ รหัส: " + rId); closeModal(); });
        };
        window.openModal = () => document.getElementById('reportModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('reportModal').style.display = 'none';
    </script>
</body>
</html>
