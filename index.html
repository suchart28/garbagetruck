<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ (Public)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3 style="margin:0;">รถเก็บขยะห่างจากคุณ</h3>
        <div id="distance-info">กำลังหาพิกัด...</div>
    </div>
    
    <button id="audioToggleBtn" class="btn-audio" onclick="toggleAudio()" title="เปิด/ปิด เสียงเตือน">🔇</button>
    <div id="map"></div>

    <div class="report-btn-container">
        <button class="btn-report" onclick="openModal()">⚠️ แจ้งปัญหาขยะ</button>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">แจ้งปัญหาขยะ</h3>
            <input type="tel" id="reporterPhone" placeholder="เบอร์โทรติดต่อกลับ (จำเป็น)">
            <button onclick="sendReport('ขยะชิ้นใหญ่')" class="btn-primary">ขยะชิ้นใหญ่</button>
            <button onclick="sendReport('ขยะล้นถัง')" class="btn-primary" style="background: #ff9800; margin-top:5px;">ขยะล้นถัง</button>
            <button onclick="closeModal()" class="btn-danger" style="margin-top:5px;">ยกเลิก</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userLatLng = null, truckMarker = null, userMarker = null;
        let reportMarkers = {}; 
        let isAudioEnabled = false, hasAlerted200m = false;

        map.locate({setView: true, maxZoom: 16, watch: true});
        map.on('locationfound', (e) => {
            userLatLng = e.latlng;
            const userIcon = L.circleMarker(userLatLng, {color:'red', radius:8}).addTo(map);
            if(!userMarker) userMarker = userIcon;
            else userMarker.setLatLng(userLatLng);
        });

        // ดึงพิกัดรถขยะ
        onValue(ref(db, 'truckLocation'), (snapshot) => {
            const d = snapshot.val();
            if (d) {
                const pos = [d.lat, d.lng];
                const html = `<div class="truck-icon-container">
                    <div class="truck-label-box"><span class="truck-id-label">เบอร์รถ: ${d.truckNo}</span><span class="truck-route-label">${d.routeName}</span></div>
                    <div class="truck-icon truck-moving"></div>
                </div>`;
                const icon = L.divIcon({ html: html, iconSize: [120, 85], iconAnchor: [60, 80] });

                if (!truckMarker) truckMarker = L.marker(pos, { icon: icon }).addTo(map);
                else { truckMarker.setLatLng(pos); truckMarker.setIcon(icon); }

                if(userLatLng) {
                    const dist = map.distance(userLatLng, pos);
                    document.getElementById('distance-info').innerText = Math.round(dist) + ' เมตร';
                    if (dist <= 200 && isAudioEnabled && !hasAlerted200m) {
                        const ut = new SpeechSynthesisUtterance("รถเก็บขยะเทศบาลนครขอนแก่นกำลังจะมาถึง โปรดเตรียมถุงขยะที่จะทิ้งให้พร้อม ขอบคุณครับ");
                        ut.lang = 'th-TH'; window.speechSynthesis.speak(ut);
                        hasAlerted200m = true;
                    } else if (dist > 300) { hasAlerted200m = false; }
                }
            }
        });

        // ดึงพิกัดแจ้งเหตุขยะ (ม่วง/ส้ม - ไม่มีกรอบขาว)
        onValue(ref(db, 'reports'), (snapshot) => {
            const reports = snapshot.val();
            Object.values(reportMarkers).forEach(m => map.removeLayer(m));
            reportMarkers = {};

            if (reports) {
                Object.keys(reports).forEach(key => {
                    const r = reports[key];
                    if (r.status === 'pending') {
                        const colorClass = (r.type === 'ขยะชิ้นใหญ่') ? 'bg-purple' : 'bg-orange';
                        
                        const reportHtml = `
                        <div class="report-marker-container">
                            <div class="report-label">${r.phone || 'ไม่ระบุ'}</div>
                            <div class="circle-icon ${colorClass}"></div>
                        </div>`;
                        
                        const icon = L.divIcon({ html: reportHtml, iconSize: [100, 50], iconAnchor: [50, 42] });
                        reportMarkers[key] = L.marker([r.lat, r.lng], { icon: icon }).addTo(map);
                    }
                });
            }
        });

        window.toggleAudio = () => {
            isAudioEnabled = !isAudioEnabled;
            document.getElementById('audioToggleBtn').innerHTML = isAudioEnabled ? "🔊" : "🔇";
            document.getElementById('audioToggleBtn').classList.toggle('active');
        };

        window.sendReport = async (type) => {
            const phone = document.getElementById('reporterPhone').value;
            if(!phone || !userLatLng) return alert("กรุณาระบุเบอร์โทรศัพท์และรอให้ระบบระบุตำแหน่งของคุณก่อน");
            
            const now = new Date();
            const dd = String(now.getDate()).padStart(2, '0');
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const yy = String(now.getFullYear() + 543).slice(-2);
            const datePrefix = `D${dd}${mm}${yy}-`;
            
            const snapshot = await get(ref(db, 'reports'));
            let currentMax = 0;
            if (snapshot.exists()) {
                Object.values(snapshot.val()).forEach(r => {
                    if (r.reportId && r.reportId.startsWith(datePrefix)) {
                        const runNum = parseInt(r.reportId.split('-')[1]);
                        if (runNum > currentMax) currentMax = runNum;
                    }
                });
            }
            const newId = datePrefix + (currentMax + 1);
            
            set(push(ref(db, 'reports')), { reportId: newId, type, phone, lat: userLatLng.lat, lng: userLatLng.lng, timestamp: Date.now(), status: 'pending' })
            .then(() => { alert("แจ้งเหตุสำเร็จ รหัส: " + newId); closeModal(); });
        };

        window.openModal = () => document.getElementById('reportModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('reportModal').style.display = 'none';
    </script>
</body>
</html>
