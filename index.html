<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3 style="margin:0; font-size: 18px;">รถเก็บขยะเทศบาล</h3>
        <div id="distance-info">กำลังหาพิกัดของคุณ...</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);

        let userLatLng = null, truckMarker = null, userMarker = null;

        const userIcon = L.divIcon({ className: 'user-icon pulse-red', iconSize: [16, 16], iconAnchor: [8, 8], html: '' });

        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', (e) => {
            userLatLng = e.latlng;
            if(!userMarker) userMarker = L.marker(userLatLng, { icon: userIcon }).addTo(map);
            else userMarker.setLatLng(userLatLng);
        });

        onValue(ref(db, 'truckLocation'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const truckPos = [data.lat, data.lng];
                const labelText = `รถ: ${data.truckNo} (${data.routeName})`;

                if (!truckMarker) {
                    // สร้างไอคอนที่มีป้ายข้อความในตัว
                    const truckHtml = `<div class="truck-icon-container">
                                        <div class="truck-icon truck-moving"></div>
                                        <div class="truck-label">${labelText}</div>
                                       </div>`;
                    const customIcon = L.divIcon({ className: '', html: truckHtml, iconSize: [100, 40], iconAnchor: [50, 12] });
                    truckMarker = L.marker(truckPos, { icon: customIcon }).addTo(map);
                } else {
                    // อัปเดตพิกัดและข้อความ
                    const truckHtml = `<div class="truck-icon-container">
                                        <div class="truck-icon truck-moving"></div>
                                        <div class="truck-label">${labelText}</div>
                                       </div>`;
                    truckMarker.setIcon(L.divIcon({ className: '', html: truckHtml, iconSize: [100, 40], iconAnchor: [50, 12] }));
                    truckMarker.setLatLng(truckPos);
                }

                if(userLatLng) {
                    const dist = map.distance(userLatLng, truckPos);
                    document.getElementById('distance-info').innerHTML = `ระยะห่าง: <strong>${dist > 1000 ? (dist/1000).toFixed(2)+' กม.' : Math.round(dist)+' ม.'}</strong>`;
                }
            } else {
                document.getElementById('distance-info').innerHTML = "<span class='danger'>ไม่มีรถปฏิบัติงาน</span>";
                if(truckMarker) { map.removeLayer(truckMarker); truckMarker = null; }
            }
        });
    </script>
</body>
</html>
