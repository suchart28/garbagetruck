<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถเก็บขยะ (Public)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="info-box">
        <h3 style="margin:0;">รถเก็บขยะเทศบาล</h3>
        <div id="distance-info">กำลังหาพิกัด...</div>
    </div>

    <button id="audioToggleBtn" class="btn-audio" onclick="toggleAudio()">🔇</button>

    <div id="map"></div>

    <div class="report-btn-container">
        <button class="btn-report" onclick="openModal()">⚠️ แจ้งปัญหาขยะ</button>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3>แจ้งปัญหาขยะ</h3>
            <input type="tel" id="reporterPhone" placeholder="เบอร์โทรติดต่อกลับ">
            <button onclick="sendReport('ขยะชิ้นใหญ่')" class="btn-primary">ขยะชิ้นใหญ่</button>
            <button onclick="sendReport('ขยะล้นถัง')" class="btn-primary" style="background: #ff9800; margin-top: 10px;">ขยะล้นถัง</button>
            <button onclick="closeModal()" class="btn-danger" style="margin-top: 10px;">ยกเลิก</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJqNlopbrZAbRgGZmUvDhA_rlYWKp5ONM",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:ad68f20b3ef395716ebef8",
            measurementId: "G-7L7V9JEFT7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userLatLng = null, truckMarker = null, userMarker = null;
        let reportMarkers = {};
        let isAudioEnabled = false;
        let hasAlerted200m = false;

        map.locate({setView: true, maxZoom: 16, watch: true});
        map.on('locationfound', (e) => {
            userLatLng = e.latlng;
            if(!userMarker) userMarker = L.circleMarker(userLatLng, {color:'red', radius:8}).addTo(map);
            else userMarker.setLatLng(userLatLng);
        });

        // ติดตามรถขยะและส่งเสียงเตือน
        onValue(ref(db, 'truckLocation'), (snapshot) => {
            const d = snapshot.val();
            if (d) {
                const pos = [d.lat, d.lng];
                const html = `<div class="truck-icon-container">
                    <div class="truck-label-box"><span class="truck-id-label">รถ: ${d.truckNo}</span></div>
                    <div class="truck-icon truck-moving"></div>
                </div>`;
                const icon = L.divIcon({ html: html, iconSize: [100, 80], iconAnchor: [50, 75] });

                if (!truckMarker) truckMarker = L.marker(pos, { icon: icon }).addTo(map);
                else { truckMarker.setLatLng(pos); truckMarker.setIcon(icon); }

                if(userLatLng) {
                    const dist = map.distance(userLatLng, pos);
                    document.getElementById('distance-info').innerText = Math.round(dist) + ' เมตร';
                    if (dist <= 200 && isAudioEnabled && !hasAlerted200m) {
                        speakText("รถเก็บขยะเทศบาลนครขอนแก่นกำลังจะมาถึง โปรดเตรียมถุงขยะที่จะทิ้งให้พร้อม ขอบคุณครับ");
                        hasAlerted200m = true;
                    } else if (dist > 300) { hasAlerted200m = false; }
                }
            }
        });

        // แสดงหมุดแจ้งเหตุ (ม่วง/ส้ม)
        onValue(ref(db, 'reports'), (snapshot) => {
            const reports = snapshot.val();
            Object.values(reportMarkers).forEach(m => map.removeLayer(m));
            reportMarkers = {};

            if (reports) {
                Object.keys(reports).forEach(key => {
                    const r = reports[key];
                    if (r.status === 'pending') {
                        const colorClass = (r.type === 'ขยะชิ้นใหญ่') ? 'bg-purple' : 'bg-orange';
                        const reportHtml = `<div class="report-marker-container">
                            <div class="report-label">${r.phone}</div>
                            <div class="circle-icon ${colorClass}"></div>
                        </div>`;
                        const icon = L.divIcon({ html: reportHtml, iconSize: [100, 40], iconAnchor: [50, 35] });
                        reportMarkers[key] = L.marker([r.lat, r.lng], { icon: icon }).addTo(map);
                    }
                });
            }
        });

        function speakText(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'th-TH';
            window.speechSynthesis.speak(ut);
        }

        window.toggleAudio = () => {
            isAudioEnabled = !isAudioEnabled;
            const btn = document.getElementById('audioToggleBtn');
            btn.innerHTML = isAudioEnabled ? "🔊" : "🔇";
            btn.classList.toggle('active');
        };

        window.sendReport = async (type) => {
            const phone = document.getElementById('reporterPhone').value;
            if(!phone || !userLatLng) return alert("กรุณาระบุเบอร์โทร");
            const newRef = push(ref(db, 'reports'));
            set(newRef, { type, phone, lat: userLatLng.lat, lng: userLatLng.lng, timestamp: Date.now(), status: 'pending' })
            .then(() => { alert("แจ้งเหตุเรียบร้อย"); closeModal(); });
        };

        window.openModal = () => document.getElementById('reportModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('reportModal').style.display = 'none';
    </script>
</body>
</html>
